spring:

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email

  datasource:
    driver-class-name: org.h2.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    # JPA ??? ???? ?? ??
    open-in-view: false
    # DataBase DDL ?? ??,??,?? ??
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        # SQL ??
        show_sql: true
        # ?? SQL ??? ??? ??
        format_sql: true
        # ?? SQL ?? ??
        highlight_sql: true
        default_batch_fetch_size: 100
        query:
          fail_on_pagination_over_collection_fetch: true

  profiles:
    active: secret