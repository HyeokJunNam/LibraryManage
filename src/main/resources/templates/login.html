<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e4ecfb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 430px;
            padding: 24px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .title {
            margin: 0 0 8px;
            font-size: 30px;
            font-weight: 800;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 28px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .message {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.error {
            background: #fff1f1;
            color: #d93025;
            border: 1px solid #ffd5d2;
        }

        .message.success {
            background: #eefaf0;
            color: #1e8e3e;
            border: 1px solid #ccebd3;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .input {
            width: 100%;
            height: 48px;
            padding: 0 14px;
            border: 1px solid #d9dfe8;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
            background: #fff;
        }

        .input:focus {
            border-color: #4c7dff;
            box-shadow: 0 0 0 4px rgba(76, 125, 255, 0.12);
        }

        .btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn-primary {
            background: #4c7dff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #3b69e6;
        }

        .btn-primary:disabled {
            background: #9fb6ff;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0 18px;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 48px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .google-btn {
            border: 1px solid #dadce0;
            background: #fff;
            color: #222;
        }

        .google-btn:hover {
            background: #f8f9fa;
        }

        .kakao-btn {
            background: #fee500;
            color: #191919;
        }

        .kakao-btn:hover {
            background: #f3d900;
        }

        .footer {
            margin-top: 22px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .link {
            color: #4c7dff;
            text-decoration: none;
            font-weight: 600;
        }

        .link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 22px;
                border-radius: 16px;
            }

            .title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <h1 class="title">로그인</h1>
        <p class="subtitle">아이디/비밀번호 또는 소셜 계정으로 로그인하세요.</p>

        <div id="successMessage" class="message success"></div>
        <div id="errorMessage" class="message error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginId" class="label">아이디</label>
                <input
                        type="text"
                        id="loginId"
                        class="input"
                        placeholder="아이디를 입력하세요"
                        required
                        autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password" class="label">비밀번호</label>
                <input
                        type="password"
                        id="password"
                        class="input"
                        placeholder="비밀번호를 입력하세요"
                        required
                        autocomplete="current-password"
                >
            </div>

            <button id="loginButton" type="submit" class="btn btn-primary">로그인</button>
        </form>

        <div class="divider">또는</div>

        <div class="social-buttons">
            <a th:href="@{/oauth2/authorization/google}" class="social-btn google-btn">
                구글로 로그인
            </a>
            <a th:href="@{/oauth2/authorization/kakao}" class="social-btn kakao-btn">
                카카오로 로그인
            </a>
        </div>

        <div class="footer">
            계정이 없으신가요?
            <a th:href="@{/signup}" class="link">회원가입 하러가기</a>
        </div>
    </div>
</div>

<script th:src="@{/js/auth.js}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const loginForm = document.getElementById("loginForm");
        const loginButton = document.getElementById("loginButton");
        const errorMessage = document.getElementById("errorMessage");
        const successMessage = document.getElementById("successMessage");

        //clearToken();

        loginForm.addEventListener("submit", login);

        function showError(message) {
            successMessage.style.display = "none";
            errorMessage.textContent = message;
            errorMessage.style.display = "block";
        }

        function showSuccess(message) {
            errorMessage.style.display = "none";
            successMessage.textContent = message;
            successMessage.style.display = "block";
        }

        function hideMessages() {
            errorMessage.style.display = "none";
            successMessage.style.display = "none";
        }

        async function login(event) {
            event.preventDefault();
            hideMessages();

            const loginId = document.getElementById("loginId").value.trim();
            const password = document.getElementById("password").value;

            if (!loginId || !password) {
                showError("아이디와 비밀번호를 입력해주세요.");
                return;
            }

            loginButton.disabled = true;

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Accept": "application/json"
                    },
                    body: JSON.stringify({
                        loginId: loginId,
                        password: password
                    })
                });

                console.log("status =", response.status);
                console.log("redirected =", response.redirected);
                console.log("url =", response.url);
                console.log("authorization =", response.headers.get("Authorization"));

                if (!response.ok) {
                    let message = "로그인에 실패했습니다.";

                    try {
                        const data = await response.json();
                        if (data && data.message) {
                            message = data.message;
                        }
                    } catch (e) {
                    }

                    showError(message);
                    return;
                }

                const authorization = response.headers.get("Authorization");

                if (!authorization) {
                    showError("인증 토큰을 받지 못했습니다.");
                    return;
                }

                setToken(authorization);
                showSuccess("로그인 성공");

                location.href = "/library/book-list";

            } catch (e) {
                console.error(e);
                showError("서버 오류가 발생했습니다.");
            } finally {
                loginButton.disabled = false;
            }
        }
    });
</script>
</body>
</html>
