<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-page__inner">

        <section class="auth-hero">
            <p class="auth-hero__eyebrow">LIBRARY</p>
            <h1 class="auth-hero__title">로그인</h1>
            <p class="auth-hero__desc">
                도서 대여 서비스를 이용하려면 로그인하세요.
            </p>
        </section>

        <section class="auth-card-wrap">
            <div class="auth-card">
                <div class="auth-card__header">
                    <h2 class="auth-card__title">회원 로그인</h2>
                    <p class="auth-card__subtitle">아이디와 비밀번호를 입력해주세요.</p>
                </div>

                <form id="loginForm" class="auth-form" th:action="@{/login}" method="post">
                    <div class="auth-form__group">
                        <label for="loginId" class="auth-form__label">아이디</label>
                        <input
                                id="loginId"
                                name="loginId"
                                type="text"
                                class="auth-form__input"
                                placeholder="아이디를 입력하세요"
                                autocomplete="username"
                                required
                        >
                    </div>

                    <div class="auth-form__group">
                        <label for="password" class="auth-form__label">비밀번호</label>
                        <input
                                id="password"
                                name="password"
                                type="password"
                                class="auth-form__input"
                                placeholder="비밀번호를 입력하세요"
                                autocomplete="current-password"
                                required
                        >
                    </div>

                    <p id="loginError" class="auth-form__error" hidden></p>

                    <button type="submit" id="loginSubmitButton" class="auth-form__submit">
                        로그인
                    </button>
                </form>
            </div>
        </section>

    </div>
</div>

<!-- JS 분리 -->
<script th:src="@{/js/login.js}"></script>
</body>
</html>
