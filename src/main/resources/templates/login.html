<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-page__inner">

        <section class="auth-hero">
            <p class="auth-hero__eyebrow">LIBRARY</p>
            <h1 class="auth-hero__title">로그인</h1>
            <p class="auth-hero__desc">도서 대여 서비스를 이용하려면 로그인하세요.</p>
        </section>

        <section class="auth-card-wrap">
            <div class="auth-card">
                <div class="auth-card__header">
                    <h2 class="auth-card__title">로그인</h2>
                </div>

                <form th:action="@{/login}" method="post" class="auth-form">

                    <div class="form-group">
                        <label class="form-label">아이디</label>
                        <input name="loginId"
                               type="text"
                               class="form-input"
                               required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">비밀번호</label>
                        <input name="password"
                               type="password"
                               class="form-input"
                               required>
                    </div>

                    <div th:if="${param.error}" class="form-message form-message--error">
                        아이디 또는 비밀번호가 올바르지 않습니다.
                    </div>

                    <button type="submit" class="submit-btn">로그인</button>
                </form>

                <div class="auth-card__footer">
                    <span>계정이 없으신가요?</span>
                    <a th:href="@{/signup}" class="text-link">회원가입</a>
                </div>
            </div>
        </section>

    </div>
</div>
</body>
</html>
