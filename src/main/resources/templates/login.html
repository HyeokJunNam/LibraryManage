<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Malgun Gothic", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e9eefb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #222;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 36px 28px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }

        .title {
            margin: 0 0 8px;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 28px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .alert {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
        }

        .alert-error {
            background: #fff2f2;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .alert-success {
            background: #f1fff4;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid #d9dfe8;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #5b8def;
            box-shadow: 0 0 0 4px rgba(91, 141, 239, 0.12);
        }

        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 6px 0 20px;
            font-size: 13px;
            color: #555;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .login-button {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            background: #2f6fed;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.05s;
        }

        .login-button:hover {
            background: #245dd0;
        }

        .login-button:active {
            transform: translateY(1px);
        }

        .bottom-text {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            color: #666;
        }

        .bottom-text a {
            color: #2f6fed;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="login-card">
        <h1 class="title">로그인</h1>
        <p class="subtitle">도서 관리 시스템에 로그인하세요.</p>

        <!-- 로그인 실패 -->
        <div class="alert alert-error" th:if="${param.error}">
            아이디 또는 비밀번호가 올바르지 않습니다.
        </div>

        <!-- 로그아웃 성공 -->
        <div class="alert alert-success" th:if="${param.logout}">
            정상적으로 로그아웃되었습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">아이디</label>
                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="아이디를 입력하세요"
                        autocomplete="username"
                        required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="비밀번호를 입력하세요"
                        autocomplete="current-password"
                        required>
            </div>

            <div class="option-row">
                <label class="checkbox-wrap">
                    <input type="checkbox" name="remember-me">
                    로그인 상태 유지
                </label>
            </div>

            <button type="submit" class="login-button">로그인</button>
        </form>

        <div class="bottom-text">
            계정이 없으신가요?
            <a th:href="@{/signup}">회원가입</a>
        </div>
    </div>
</div>
</body>
</html>
