<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${appName} + ' 이메일 인증'">이메일 인증</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f7fb; font-family:Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; color:#111827;">
<div style="display:none; max-height:0; overflow:hidden; opacity:0;">
    이메일 인증 코드를 확인해 주세요.
</div>

<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f4f7fb; margin:0; padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px; margin:0 auto;">
                <tr>
                    <td style="padding:0 16px;">
                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ffffff; border-radius:16px; overflow:hidden;">
                            <tr>
                                <td style="padding:28px 32px; text-align:center; background:linear-gradient(135deg, #2563eb, #1d4ed8);">
                                    <div style="font-size:24px; font-weight:700; color:#ffffff;" th:text="${appName}">MyService</div>
                                    <div style="margin-top:8px; font-size:14px; color:#dbeafe;">이메일 인증</div>
                                </td>
                            </tr>

                            <tr>
                                <td style="padding:32px;">
                                    <h1 style="margin:0 0 12px; font-size:24px; line-height:1.4; color:#111827;">
                                        인증 코드를 입력해 주세요
                                    </h1>

                                    <p style="margin:0 0 12px; font-size:16px; line-height:1.7; color:#374151;">
                                        <span th:text="${userName}">회원</span>님, 안녕하세요.
                                    </p>

                                    <p style="margin:0 0 24px; font-size:16px; line-height:1.7; color:#374151;">
                                        아래 인증 코드를 회원가입 화면에 입력하면 이메일 인증이 완료됩니다.
                                    </p>

                                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 24px; background-color:#eff6ff; border:1px solid #bfdbfe; border-radius:12px;">
                                        <tr>
                                            <td style="padding:20px; text-align:center;">
                                                <p style="margin:0 0 8px; font-size:14px; color:#1d4ed8;">인증 코드</p>
                                                <p th:text="${code}"
                                                   style="margin:0; font-size:34px; line-height:1.2; font-weight:700; letter-spacing:8px; color:#1e3a8a;">
                                                    123456
                                                </p>
                                            </td>
                                        </tr>
                                    </table>

                                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="margin:0 0 24px; background-color:#f9fafb; border:1px solid #e5e7eb; border-radius:12px;">
                                        <tr>
                                            <td style="padding:16px 20px;">
                                                <p style="margin:0 0 8px; font-size:14px; color:#6b7280;">유효 시간</p>
                                                <p style="margin:0; font-size:16px; font-weight:700; color:#111827;">
                                                    <span th:text="${expireMinutes}">10</span>분
                                                </p>
                                            </td>
                                        </tr>
                                    </table>

                                    <p style="margin:0 0 8px; font-size:14px; line-height:1.7; color:#6b7280;">
                                        본인이 요청하지 않았다면 이 메일은 무시하셔도 됩니다.
                                    </p>

                                    <p style="margin:0; font-size:14px; line-height:1.7; color:#6b7280;">
                                        감사합니다.<br />
                                    </p>
                                </td>
                            </tr>
                        </table>

                        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                            <tr>
                                <td style="padding:16px 8px 0; text-align:center;">
                                    <p style="margin:0; font-size:12px; line-height:1.6; color:#9ca3af;">
                                        본 메일은 발신 전용입니다.
                                    </p>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
