<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 목록</title>
    <th:block th:replace="~{common/user/user-page-assets :: assets}"></th:block>

    <link rel="stylesheet" th:href="@{/css/common/user/topbar.css}">
    <link rel="stylesheet" th:href="@{/css/user/books.css}">
</head>
<body>
<div class="app">
    <div th:replace="~{common/user/topbar :: topbar}"></div>

    <div class="book-list">
        <main class="book-list__page">
            <section class="search-panel">
                <div class="search-panel__head">
                    <div>
                        <h1 class="search-panel__title">도서 검색</h1>
                        <p class="search-panel__desc">전체 도서와 검색 결과를 이 화면에서 바로 확인할 수 있습니다.</p>
                    </div>
                </div>

                <form id="searchForm" class="search-form">
                    <div class="search-form__row">
                        <div class="field field--select">
                            <label for="condition" class="field__label">검색 조건</label>
                            <select id="condition" class="field__control">
                                <option value="title">도서명</option>
                                <option value="isbn">ISBN</option>
                                <option value="author">저자</option>
                                <option value="publisher">출판사</option>
                            </select>
                        </div>

                        <div class="field field--input">
                            <label for="keyword" class="field__label">검색어</label>
                            <input
                                    id="keyword"
                                    type="text"
                                    class="field__control"
                                    placeholder="검색어를 입력하세요"
                            >
                        </div>

                        <div class="search-form__actions">
                            <button type="submit" class="btn btn--primary btn--xl">검색</button>
                            <button type="button" id="resetBtn" class="btn btn--ghost btn--xl">초기화</button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="table-panel">
                <div class="table-panel__head">
                    <div>
                        <h2 class="table-panel__title">도서 목록</h2>
                        <p class="table-panel__desc">전체 도서 또는 검색된 도서를 확인할 수 있습니다.</p>
                    </div>
                </div>

                <div
                        th:if="${books == null
                            or books.content == null
                            or #lists.isEmpty(books.content)}"
                        class="empty-block"
                >
                    <div class="empty-block__icon">📚</div>
                    <div class="empty-block__title">조회된 도서가 없습니다.</div>
                    <div class="empty-block__desc">검색 조건을 변경해서 다시 시도해보세요.</div>
                </div>

                <div
                        th:if="${books != null
                            and books.content != null
                            and !#lists.isEmpty(books.content)}"
                        class="table-block table-block--reserve-space"
                >
                    <div class="ui-table" style="--table-columns: 2fr 1.4fr 1fr 1fr;">
                        <div class="ui-table__header">
                            <div class="ui-table__cell">도서명</div>
                            <div class="ui-table__cell">ISBN</div>
                            <div class="ui-table__cell">저자</div>
                            <div class="ui-table__cell">출판사</div>
                        </div>

                        <div
                                th:each="book : ${books.content}"
                                class="ui-table__row ui-table__row--clickable"
                                tabindex="0"
                                th:attr="data-book-url=@{/library/books/{bookId}(bookId=${book.id})}"
                        >
                            <div class="ui-table__cell ui-table__cell--primary">
                                <a
                                        class="book-title-link"
                                        th:href="@{/library/books/{bookId}(bookId=${book.id})}"
                                        th:text="${book.title}"
                                >
                                    도서명
                                </a>
                            </div>

                            <div class="ui-table__cell" th:text="${book.isbn}">9780000000000</div>
                            <div class="ui-table__cell" th:text="${book.author}">저자</div>
                            <div class="ui-table__cell" th:text="${book.publisher}">출판사</div>
                        </div>
                    </div>

                    <div
                            class="table-block__pagination"
                            th:if="${books.pageMetadata != null and books.pageMetadata.totalPages > 1}"
                    >
                        <div
                                id="pagination"
                                data-pagination
                                th:data-current-page="${books.pageMetadata.number}"
                                th:data-total-pages="${books.pageMetadata.totalPages}"
                                th:data-page-size="${books.pageMetadata.size}"
                                data-base-url="/library/books"
                        ></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</div>

<script type="module" th:src="@{/js/user/books.js}"></script>
</body>
</html>
