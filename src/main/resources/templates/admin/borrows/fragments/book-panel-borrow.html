<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="bookPanelBorrowMode">

    <section class="book-panel__mode-panel is-hidden" id="bookBorrowModePanel">

        <section class="book-selection-empty" id="bookSelectionEmpty">
            <div class="book-selection-empty__icon">➕</div>
            <h4 class="book-selection-empty__title">도서를 선택하세요</h4>
        </section>

        <section class="book-result is-hidden" id="bookPanelResult">

            <div class="table-block table-block--reserve-space book-result__table-block">
                <div class="ui-table-wrap">
                    <div class="ui-table book-result__table">

                        <div class="ui-table__header">
                            <div class="ui-table__leading-cell">No</div>
                            <div class="ui-table__cell">도서명</div>
                            <div class="ui-table__cell">ISBN</div>
                            <div class="ui-table__cell">저자</div>
                            <div class="ui-table__cell">출판사</div>
                            <div class="ui-table__cell">위치</div>
                            <div class="ui-table__cell ui-table__cell--center">재고</div>
                            <div class="ui-table__cell ui-table__cell--center">대여 가능</div>
                            <div class="ui-table__cell ui-table__cell--center">수량</div>
                            <div class="ui-table__cell ui-table__cell--center">관리</div>
                        </div>

                        <div id="selectedBookList">
                            <div id="selectedBookEmptyRow" class="empty-block ui-table__empty-row">
                                선택된 도서가 없습니다.
                            </div>
                        </div>

                    </div>
                </div>

                <div class="table-block__pagination" id="selectedBookPaginationWrap">
                    <div id="selectedBookPagination" data-pagination></div>
                </div>
            </div>

        </section>

        <div class="book-panel__footer is-hidden" id="bookPanelFooter">
            <button
                    type="button"
                    class="book-panel__footer-btn book-panel__footer-btn--secondary"
                    id="resetBorrowButton"
                    disabled>
                초기화
            </button>

            <button
                    type="button"
                    class="book-panel__footer-btn book-panel__footer-btn--primary"
                    id="confirmBorrowButton"
                    disabled>
                확인
            </button>
        </div>

        <template id="selectedBookRowTemplate">
            <div class="ui-table__row book-result__row">
                <div class="ui-table__leading-cell book-result__cell--index" data-field="index"></div>

                <div class="ui-table__cell ui-table__cell--primary">
                    <span class="ui-table__text" data-field="title"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--muted" data-field="isbn"></div>
                <div class="ui-table__cell" data-field="author"></div>
                <div class="ui-table__cell" data-field="publisher"></div>
                <div class="ui-table__cell" data-field="location"></div>

                <div class="ui-table__cell ui-table__cell--center" data-field="stockQuantity"></div>
                <div class="ui-table__cell ui-table__cell--center" data-field="availableQuantity"></div>

                <div class="ui-table__cell ui-table__cell--center">
                    <div class="book-result__quantity-box">
                        <button
                                type="button"
                                class="book-result__quantity-btn"
                                data-role="decrease-book-quantity">
                            −
                        </button>

                        <input
                                type="number"
                                class="book-result__quantity-input"
                                data-role="book-quantity-input"
                                min="1">

                        <button
                                type="button"
                                class="book-result__quantity-btn"
                                data-role="increase-book-quantity">
                            +
                        </button>
                    </div>
                </div>

                <div class="ui-table__cell ui-table__cell--center">
                    <button
                            type="button"
                            class="book-result__remove-btn"
                            data-role="remove-selected-book">
                        삭제
                    </button>
                </div>
            </div>
        </template>

    </section>

</th:block>
</body>
</html>
