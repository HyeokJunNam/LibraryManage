<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="bookPanelReturnMode">

    <section class="book-panel__mode-panel is-hidden" id="bookReturnModePanel">

        <section class="book-selection-empty is-hidden" id="returnBookEmpty">
            <div class="book-selection-empty__icon">↩️</div>
            <h4 class="book-selection-empty__title">반납할 도서가 없습니다</h4>
        </section>

        <section class="book-selection-empty is-hidden" id="returnBookLoading">
            <div class="book-selection-empty__icon">⏳</div>
            <h4 class="book-selection-empty__title">대출 도서를 불러오는 중입니다</h4>
        </section>

        <section class="book-result is-hidden" id="returnBookResult">

            <div class="table-block table-block--reserve-space book-result__table-block">
                <div class="ui-table-wrap">
                    <div class="ui-table book-return-result__table">

                        <div class="ui-table__header">
                            <div class="ui-table__leading-cell"></div>

                            <div class="ui-table__cell ui-table__cell--center-start">
                                <span class="ui-table__text">대출 ID</span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--center-start"
                                 >
                                <span class="ui-table__text">재고 ID</span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--fill-start">
                                <span class="ui-table__text">도서명</span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--center-start"
                                 >
                                <span class="ui-table__text">대출일</span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--center-start"
                                 >
                                <span class="ui-table__text">반납 예정일</span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--center-start"
                                 >
                                <span class="ui-table__text">연체여부</span>
                            </div>
                        </div>

                        <div id="returnBookList">
                            <div id="returnBookEmptyRow" class="empty-block ui-table__empty-row">
                                대출 중인 도서가 없습니다.
                            </div>
                        </div>

                    </div>
                </div>

                <div class="table-block__pagination" id="returnBookPaginationWrap">
                    <div id="returnBookPagination" data-pagination></div>
                </div>
            </div>

        </section>

        <div class="book-panel__footer is-hidden" id="returnBookPanelFooter">
            <div class="book-panel__footer-info">
                선택한 도서 <strong id="selectedReturnBookCount">0</strong>권
            </div>

            <button
                    type="button"
                    class="book-panel__footer-btn book-panel__footer-btn--secondary"
                    id="resetReturnBookButton"
                    disabled>
                선택 해제
            </button>

            <button
                    type="button"
                    class="book-panel__footer-btn book-panel__footer-btn--primary"
                    id="confirmReturnBookButton"
                    disabled>
                반납 확인
            </button>
        </div>

        <template id="returnBookRowTemplate">
            <div
                    class="ui-table__row book-result__row book-return-result__row"
                    data-role="select-return-book"
                    role="button"
                    tabindex="0">

                <div class="ui-table__leading-cell">
                    <input
                            type="checkbox"
                            class="book-return-result__checkbox"
                            data-role="return-book-checkbox"
                            tabindex="-1"
                            aria-hidden="true">
                </div>

                <div class="ui-table__cell ui-table__cell--center-start"
                     >
                    <span class="ui-table__text" data-field="borrowRecordId"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--center-start"
                     >
                    <span class="ui-table__text" data-field="bookItemId"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--primary ui-table__cell--fill-start">
                    <span class="ui-table__text" data-field="bookTitle"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--center-start"
                     >
                    <span class="ui-table__text" data-field="borrowedAt"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--center-start"
                     >
                    <span class="ui-table__text" data-field="dueAt"></span>
                </div>

                <div class="ui-table__cell ui-table__cell--center-start"
                     >
                    <span class="book-return-result__overdue-badge" data-field="overdueText"></span>
                </div>
            </div>
        </template>

    </section>

</th:block>
</body>
</html>
