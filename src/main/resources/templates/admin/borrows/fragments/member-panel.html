<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="memberPanel">

    <section class="member-panel">
        <div class="member-panel__header">
            <div class="member-panel__header-main">
                <div class="member-panel__title-row">
                    <h3 class="member-panel__title">회원 조회</h3>
                    <button
                            type="button"
                            class="member-panel__search-btn"
                            data-role="open-member-search">
                        🔍 검색
                    </button>
                </div>

                <p class="member-panel__desc">
                    선택된 회원의 정보를 확인할 수 있습니다.
                </p>
            </div>
        </div>

        <div class="member-panel__body">
            <section class="member-empty-state" id="selectedMemberEmpty">
                <div class="member-empty-state__icon">👤</div>
                <h4 class="member-empty-state__title">선택된 회원이 없습니다</h4>
                <p class="member-empty-state__desc">
                    우측 상단의 검색 버튼을 눌러 회원을 조회하세요.
                </p>
            </section>

            <section class="member-result is-hidden" id="selectedMemberResult">
                <div class="member-info-card">
                    <div class="member-info-card__top">
                        <div class="member-info-card__identity">
                            <p class="member-info-card__eyebrow">Selected member</p>

                            <div class="member-info-card__name-row">
                                <h4 class="member-info-card__name" id="selectedMemberName">-</h4>
                                <span class="member-info-card__member-no-chip" id="selectedMemberNo">-</span>
                            </div>

                            <p class="member-info-card__meta" id="selectedMemberMeta">
                                선택된 회원의 기본 정보를 확인할 수 있습니다.
                            </p>
                        </div>
                    </div>

                    <div class="member-info-card__body">
                        <div class="member-info-card__info">
                            <div class="member-info-card__info-row">
                                <span class="member-info-card__label">이메일</span>
                                <span class="member-info-card__value" id="selectedMemberEmail">-</span>
                            </div>

                            <div class="member-info-card__info-row">
                                <span class="member-info-card__label">상태</span>
                                <span class="member-info-card__value">대출 처리 가능</span>
                            </div>
                        </div>

                        <p class="member-info-card__notice">
                            현재 선택된 회원 기준으로 대출/반납 처리가 진행됩니다.
                        </p>
                    </div>
                </div>
            </section>
        </div>
    </section>

</th:block>
</body>
</html>
