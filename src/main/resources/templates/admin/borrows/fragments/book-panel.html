<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="bookPanel">

    <section class="book-panel" data-mode="idle" id="bookPanel">

        <div class="book-panel__header">
            <div class="book-panel__header-main">

                <div class="book-panel__title-row">
                    <div class="book-panel__title-group">
                        <h3 class="book-panel__title">신청 도서 목록</h3>
                        <span class="book-panel__mode-badge is-hidden" id="bookPanelModeBadge"></span>
                    </div>

                    <button
                            type="button"
                            class="book-panel__action-btn is-hidden"
                            id="openBookSearchButton"
                            data-role="open-book-search"
                            disabled>
                        + 도서 검색
                    </button>
                </div>

                <p class="book-panel__desc" id="bookPanelDesc">
                    대출 또는 반납할 회원을 먼저 선택하세요.
                </p>

            </div>
        </div>

        <div class="book-panel__body">

            <section class="book-empty-state" id="bookPanelEmpty">
                <div class="book-empty-state__icon">📚</div>
                <h4 class="book-empty-state__title">표시할 도서가 없습니다</h4>
            </section>

            <!--
                아래 th:replace 경로는 실제 템플릿 위치에 맞게 수정하세요.

                예:
                th:replace="~{admin/circulation/fragments/book-panel-borrow :: bookPanelBorrowMode}"
                th:replace="~{admin/circulation/fragments/book-panel-return :: bookPanelReturnMode}"
            -->
            <th:block th:replace="~{admin/borrows/fragments/book-panel-borrow :: bookPanelBorrowMode}"></th:block>
            <th:block th:replace="~{admin/borrows/fragments/book-panel-return :: bookPanelReturnMode}"></th:block>

        </div>

    </section>

</th:block>
</body>
</html>
