<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대출 / 반납 처리</title>

    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/table-block.css}">
    <link rel="stylesheet" th:href="@{/css/common/modal-alert.css}">

    <link rel="stylesheet" th:href="@{/css/admin/common/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/admin/common/admin-layout.css}">

    <link rel="stylesheet" th:href="@{/css/admin/process.css}">
    <link rel="stylesheet" th:href="@{/css/admin/process-member-panel.css}">
    <link rel="stylesheet" th:href="@{/css/admin/process-book-panel.css}">
    <link rel="stylesheet" th:href="@{/css/admin/process-member-search-modal.css}">
    <link rel="stylesheet" th:href="@{/css/admin/process-book-search-modal.css}">
</head>
<body>
<div class="admin-page">
    <aside th:replace="~{admin/common/fragments/sidebar :: sidebar('borrow-process')}"></aside>

    <main class="admin-main borrow-process-page">
        <header class="process-hero">
            <div class="process-hero__content">
                <p class="process-hero__eyebrow">BORROW MANAGEMENT</p>
                <h2 class="process-hero__title">대출 / 반납 처리</h2>
                <p class="process-hero__desc">
                    회원 조회 후 도서 대출 및 반납 처리를 진행합니다.
                </p>
            </div>
        </header>

        <section class="process-layout">
            <div th:replace="~{admin/borrows/fragments/member-panel :: memberPanel}"></div>
            <div th:replace="~{admin/borrows/fragments/book-panel :: bookPanel}"></div>
        </section>
    </main>

    <div th:replace="~{common/modal-alert :: alertModal}"></div>
    <div th:replace="~{admin/borrows/fragments/member-search-modal :: memberSearchModal}"></div>
    <div th:replace="~{admin/borrows/fragments/book-search-modal :: bookSearchModal}"></div>
</div>

<script th:src="@{/js/common/api.js}"></script>
<script th:src="@{/js/common/modal-alert.js}"></script>
<script type="module" th:src="@{/js/admin/process.js}"></script>
</body>
</html>
