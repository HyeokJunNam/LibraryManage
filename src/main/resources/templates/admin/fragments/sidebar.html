<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="admin-sidebar" th:fragment="sidebar(activeMenu)">
    <div class="admin-sidebar__brand">
        <a th:href="@{/admin/dashboard}" class="admin-sidebar__brand-link" aria-label="관리자 메인으로 이동">
            <div class="admin-sidebar__logo">📚</div>
        </a>
        <div>
            <p class="admin-sidebar__eyebrow">LIBRARY ADMIN</p>
            <h1 class="admin-sidebar__title">관리자 센터</h1>
        </div>
    </div>

    <nav class="admin-nav">
        <a th:href="@{/admin/dashboard}"
           class="admin-nav__item"
           th:classappend="${activeMenu == 'dashboard'} ? ' admin-nav__item--active' : ''">
            대시보드
        </a>

        <a th:href="@{/admin/members}"
           class="admin-nav__item"
           th:classappend="${activeMenu == 'members'} ? ' admin-nav__item--active' : ''">
            회원 관리
        </a>

        <a th:href="@{/admin/books}"
           class="admin-nav__item"
           th:classappend="${activeMenu == 'books'} ? ' admin-nav__item--active' : ''">
            도서 관리
        </a>

        <div class="admin-nav__group"
             th:classappend="${activeMenu == 'borrow-process' or activeMenu == 'borrow-status'} ? ' admin-nav__group--open' : ''">

            <button type="button"
                    class="admin-nav__item admin-nav__toggle"
                    th:classappend="${activeMenu == 'borrow-process' or activeMenu == 'borrow-status'} ? ' admin-nav__item--active' : ''"
                    aria-expanded="false">
                <span>대출 관리</span>
                <span class="admin-nav__arrow" aria-hidden="true">▾</span>
            </button>

            <div class="admin-nav__sub">
                <a th:href="@{/admin/borrows/process}"
                   class="admin-nav__sub-item"
                   th:classappend="${activeMenu == 'borrow-process'} ? ' admin-nav__sub-item--active' : ''">
                    대출 / 반납 처리
                </a>

                <a th:href="@{/admin/borrows/status}"
                   class="admin-nav__sub-item"
                   th:classappend="${activeMenu == 'borrow-status'} ? ' admin-nav__sub-item--active' : ''">
                    대출 현황
                </a>
            </div>
        </div>

        <a th:href="@{/admin/settings}"
           class="admin-nav__item"
           th:classappend="${activeMenu == 'settings'} ? ' admin-nav__item--active' : ''">
            설정
        </a>
    </nav>

    <div class="admin-sidebar__footer">
        <div class="admin-profile">
            <div class="admin-profile__avatar">관</div>
            <div>
                <p class="admin-profile__name"
                   th:text="${#authentication != null and #authentication.principal != null ? #authentication.principal.name : '관리자'}">
                    관리자
                </p>
                <p class="admin-profile__role">시스템 운영자</p>
            </div>
        </div>

        <form th:action="@{/logout}" method="post" class="admin-logout-form">
            <!--<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">-->
            <button type="submit" class="admin-logout-button">
                <span class="admin-logout-button__icon" aria-hidden="true">↪</span>
                <span>로그아웃</span>
            </button>
        </form>
    </div>

    <script th:src="@{/js/admin/fragments/sidebar.js}"></script>
</aside>
</body>
</html>
