<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>

<section th:fragment="bookCopies"
         class="book-detail-copies-card"
         id="bookDetailCopiesCard"
         th:data-book-id="${bookId}">

    <div class="book-detail-copies-card__head">
        <div>
            <h3 class="book-detail-copies-card__title">도서 재고 현황</h3>
            <p class="book-detail-copies-card__desc">
                이 도서에 등록된 개별 재고의 상태를 확인합니다.
            </p>
        </div>

        <div class="book-detail-copies-card__actions">
            <button type="button"
                    class="btn btn--primary book-detail-copies-card__edit-button"
                    id="editBookCopiesButton">
                재고 수정
            </button>

            <div class="book-detail-copies-card__edit-actions is-hidden"
                 id="bookCopyEditActions">
                <button type="button"
                        class="btn btn--primary book-detail-copies-card__save-button"
                        id="saveBookCopiesButton">
                    저장
                </button>

                <button type="button"
                        class="btn btn--ghost book-detail-copies-card__cancel-button"
                        id="cancelBookCopiesButton">
                    취소
                </button>
            </div>
        </div>
    </div>

    <div class="book-detail-copies-card__body">

        <div th:if="${bookCopies == null or #lists.isEmpty(bookCopies)}"
             class="book-detail-copies-empty"
             id="bookDetailCopiesEmpty">
            <div class="book-detail-copies-empty__icon">📦</div>
            <h4 class="book-detail-copies-empty__title">등록된 재고가 없습니다</h4>
            <p class="book-detail-copies-empty__desc">
                이 도서에 연결된 개별 재고가 아직 없습니다.
            </p>
        </div>

        <div class="table-block table-block--reserve-space book-detail-copies-table-block"
             id="bookDetailCopiesTableBlock"
             th:classappend="${bookCopies == null or #lists.isEmpty(bookCopies)} ? ' is-hidden' : ''">

            <div class="ui-table-wrap">
                <div class="ui-table book-detail-copies-table">

                    <div class="ui-table__header">
                        <div class="ui-table__leading-cell">No</div>
                        <div class="ui-table__cell">재고 ID</div>
                        <div class="ui-table__cell ui-table__cell--center">도서 상태</div>
                        <div class="ui-table__cell">재고 위치</div>
                        <div class="ui-table__cell">등록일</div>
                        <div class="ui-table__cell ui-table__cell--center">대출 상태</div>
                        <div class="ui-table__cell ui-table__cell--center">관리</div>
                    </div>

                    <div id="bookDetailCopyRows"
                         th:data-page-start-index="${pageMetaData != null
                            ? pageMetaData.page * pageMetaData.size
                            : 0}">

                        <div th:each="bookCopy, stat : ${bookCopies}"
                             class="ui-table__row book-detail-copies-table__row"
                             data-row-mode="clean"
                             th:data-book-copy-id="${bookCopy.bookCopyId}"
                             th:data-borrowed="${bookCopy.borrowStatus != null and bookCopy.borrowStatus.value == 'BORROWED'}"
                             th:data-original-status="${bookCopy.bookCopyStatus != null ? bookCopy.bookCopyStatus.value : ''}"
                             th:data-original-location="${bookCopy.location != null ? bookCopy.location : ''}">

                            <div class="ui-table__leading-cell">
                                <span class="book-detail-copy-row__index"
                                      th:text="${pageMetaData != null
                                        ? pageMetaData.page * pageMetaData.size + stat.index + 1
                                        : stat.index + 1}">
                                    1
                                </span>
                            </div>

                            <div class="ui-table__cell"
                                 th:text="${bookCopy.bookCopyId != null ? bookCopy.bookCopyId : '-'}">
                                1
                            </div>

                            <div class="ui-table__cell ui-table__cell--center">
                                <span class="book-detail-copy-status-view status-badge"
                                      th:classappend="${bookCopy.bookCopyStatus != null
                                          ? ' status-badge--' + #strings.toLowerCase(bookCopy.bookCopyStatus.value)
                                          : ' status-badge--default'}"
                                      th:text="${bookCopy.bookCopyStatus != null
                                          and bookCopy.bookCopyStatus.label != null
                                          and !#strings.isEmpty(bookCopy.bookCopyStatus.label)
                                              ? bookCopy.bookCopyStatus.label
                                              : '-'}">
                                    상태
                                </span>

                                <select class="book-detail-copy-control book-detail-copy-status-edit is-hidden"
                                        data-field="status"
                                        th:disabled="${bookCopy.borrowStatus != null and bookCopy.borrowStatus.value == 'BORROWED'}"
                                        th:classappend="${bookCopy.bookCopyStatus != null
                                            ? ' book-detail-copy-status-edit--' + #strings.toLowerCase(bookCopy.bookCopyStatus.value)
                                            : ''}">
                                    <option th:each="statusOption : ${options.bookCopyStatuses}"
                                            th:value="${statusOption.value}"
                                            th:text="${statusOption.label}"
                                            th:selected="${bookCopy.bookCopyStatus != null
                                                and bookCopy.bookCopyStatus.value == statusOption.value}">
                                        상태
                                    </option>
                                </select>
                            </div>

                            <div class="ui-table__cell">
                                <span class="book-detail-copy-location-view"
                                      th:text="${bookCopy.location != null and !#strings.isEmpty(bookCopy.location) ? bookCopy.location : '-'}">
                                    A-01
                                </span>

                                <input type="text"
                                       class="book-detail-copy-control book-detail-copy-location-edit is-hidden"
                                       data-field="location"
                                       placeholder="예: A-01"
                                       autocomplete="off"
                                       th:value="${bookCopy.location != null ? bookCopy.location : ''}"
                                       th:disabled="${bookCopy.borrowStatus != null and bookCopy.borrowStatus.value == 'BORROWED'}">
                            </div>

                            <div class="ui-table__cell"
                                 th:text="${bookCopy.createdAt != null ? #temporals.format(bookCopy.createdAt, 'yyyy-MM-dd') : '-'}">
                                2026-04-30
                            </div>

                            <div class="ui-table__cell ui-table__cell--center">
                                <span class="status-badge"
                                      th:classappend="${bookCopy.borrowStatus != null
                                          ? ' status-badge--' + #strings.toLowerCase(bookCopy.borrowStatus.value)
                                          : ' status-badge--default'}"
                                      th:text="${bookCopy.borrowStatus != null
                                          and bookCopy.borrowStatus.label != null
                                          and !#strings.isEmpty(bookCopy.borrowStatus.label)
                                              ? bookCopy.borrowStatus.label
                                              : '-'}">
                                    대출 상태
                                </span>
                            </div>

                            <div class="ui-table__cell ui-table__cell--center">
                                <span class="book-detail-copy-row__state">기존</span>

                                <button type="button"
                                        class="book-detail-copy-row__delete is-hidden"
                                        data-role="mark-delete-row"
                                        th:disabled="${bookCopy.borrowStatus != null and bookCopy.borrowStatus.value == 'BORROWED'}">
                                    삭제
                                </button>

                                <button type="button"
                                        class="book-detail-copy-row__cancel-delete is-hidden"
                                        data-role="cancel-delete-row">
                                    취소
                                </button>
                            </div>

                        </div>

                    </div>

                    <button type="button"
                            class="book-detail-copies-add-row is-hidden"
                            id="addBookCopyRowButton">
                        <span class="book-detail-copies-add-row__icon">+</span>
                        <span class="book-detail-copies-add-row__text">재고 행 추가</span>
                    </button>

                </div>
            </div>

            <th:block th:replace="~{common/table-block ::
                pagination(
                    ${pageMetaData},
                    'ajax',
                    null,
                    'book-copies:page-change'
                )
            }"></th:block>
        </div>

    </div>

    <template id="bookDetailCopyRowTemplate">
        <div class="ui-table__row book-detail-copies-table__row book-detail-copies-table__row--created"
             data-row-mode="created"
             data-borrowed="false">

            <div class="ui-table__leading-cell">
                <span class="book-detail-copy-row__index">신규</span>
            </div>

            <div class="ui-table__cell">
                <span class="book-detail-copy-row__new-label">신규</span>
            </div>

            <div class="ui-table__cell ui-table__cell--center">
                <select class="book-detail-copy-control book-detail-copy-status-edit book-detail-copy-status-edit--available"
                        data-field="status">
                    <option th:each="statusOption : ${options.bookCopyStatuses}"
                            th:value="${statusOption.value}"
                            th:text="${statusOption.label}"
                            th:selected="${statusOption.value == 'AVAILABLE'}">
                        상태
                    </option>
                </select>
            </div>

            <div class="ui-table__cell">
                <input type="text"
                       class="book-detail-copy-control book-detail-copy-location-edit"
                       data-field="location"
                       placeholder="예: A-01"
                       autocomplete="off">
            </div>

            <div class="ui-table__cell">
                -
            </div>

            <div class="ui-table__cell ui-table__cell--center">
                <span class="book-detail-copy-row__empty-value">-</span>
            </div>

            <div class="ui-table__cell ui-table__cell--center">
                <button type="button"
                        class="book-detail-copy-row__remove"
                        data-role="remove-created-row">
                    삭제
                </button>
            </div>

        </div>
    </template>

</section>

</body>
</html>
