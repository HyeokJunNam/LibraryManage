<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 상세</title>

    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/topbar.css}">
    <link rel="stylesheet" th:href="@{/css/book-detail.css}">
    <link rel="stylesheet" th:href="@{/css/modal-alert.css}">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="book-detail">
        <main class="page"
              th:attr="data-book-id=${book != null and book.id != null ? book.id : ''}">
            <div class="detail-toolbar">
                <div class="detail-toolbar__spacer" aria-hidden="true"></div>
                <a href="#" class="detail-back-btn" data-role="back-to-list-button">목록으로</a>
            </div>

            <section class="detail-hero">
                <div class="detail-hero__main">
                    <div class="book-cover">
                        <div class="book-cover__inner">
                            <img
                                    class="book-cover__image"
                                    th:if="${book != null and book.thumbnailUrl != null and !#strings.isEmpty(book.thumbnailUrl)}"
                                    th:src="${book.thumbnailUrl}"
                                    th:alt="${(book.title != null and !#strings.isEmpty(book.title) ? book.title : '도서') + ' 이미지'}"
                            >

                            <div class="book-cover__placeholder"
                                 th:if="${book == null or book.thumbnailUrl == null or #strings.isEmpty(book.thumbnailUrl)}">
                                <span>BOOK</span>
                            </div>
                        </div>
                    </div>

                    <div class="book-summary-wrap">
                        <div class="book-summary">
                            <h1 class="book-summary__title"
                                th:text="${book != null and book.title != null and !#strings.isEmpty(book.title) ? book.title : '도서명 미등록'}">
                                도서명 미등록
                            </h1>

                            <div class="book-summary__meta-list">
                                <div class="book-meta-chip">
                                    <span class="book-meta-chip__label">ISBN</span>
                                    <strong class="book-meta-chip__value"
                                            th:text="${book != null and book.isbn != null and !#strings.isEmpty(book.isbn) ? book.isbn : '-'}">
                                        -
                                    </strong>
                                </div>

                                <div class="book-meta-chip">
                                    <span class="book-meta-chip__label">저자</span>
                                    <strong class="book-meta-chip__value"
                                            th:text="${book != null and book.author != null and !#strings.isEmpty(book.author) ? book.author : '저자 미등록'}">
                                        저자 미등록
                                    </strong>
                                </div>

                                <div class="book-meta-chip">
                                    <span class="book-meta-chip__label">출판사</span>
                                    <strong class="book-meta-chip__value"
                                            th:text="${book != null and book.publisher != null and !#strings.isEmpty(book.publisher) ? book.publisher : '출판사 미등록'}">
                                        출판사 미등록
                                    </strong>
                                </div>
                            </div>

                            <p class="book-summary__description"
                               th:text="${book != null and book.description != null and !#strings.isEmpty(book.description) ? book.description : '등록된 도서 설명이 없습니다.'}">
                                등록된 도서 설명이 없습니다.
                            </p>
                        </div>
                    </div>
                </div>

                <aside class="detail-hero__side">
                    <div class="action-card">
                        <div class="action-card__section">
                            <span class="action-card__label">현재 상태</span>

                            <strong class="action-card__status action-card__status--signal action-card__status--unknown"
                                    th:if="${book == null or book.canBorrow == null}">
                                상태 미확인
                            </strong>

                            <strong class="action-card__status action-card__status--signal action-card__status--available"
                                    th:if="${book != null and book.canBorrow == true}">
                                대출 가능
                            </strong>

                            <strong class="action-card__status action-card__status--signal action-card__status--unavailable"
                                    th:if="${book != null and book.canBorrow == false}">
                                대출 불가
                            </strong>
                        </div>

                        <div class="action-card__section">
                            <span class="action-card__label">도서 위치</span>
                            <strong class="action-card__location"
                                    th:text="${book != null and book.location != null and !#strings.isEmpty(book.location) ? book.location : '-'}">
                                -
                            </strong>
                        </div>

                        <div class="action-card__section">
                            <button
                                    type="button"
                                    class="notify-btn"
                                    data-role="notify-button"
                                    th:classappend="
                                    ${(book != null and book.canBorrow == false) ? ' notify-btn--enabled' : ''}
                                    + ${(notification != null and notification.requested) ? ' notify-btn--done' : ''}
                                "
                                    th:disabled="
                                    ${book == null
                                    or book.canBorrow == null
                                    or book.canBorrow
                                    or (notification != null and notification.requested)}
                                "
                                    th:attr="data-completed=${notification != null and notification.requested}">

                                <span class="notify-btn__icon" aria-hidden="true"
                                      th:text="${notification != null and notification.requested} ? '✅' : '🔔'">
                                    🔔
                                </span>

                                <span class="notify-btn__text"
                                      th:text="${notification != null and notification.requested} ? '신청 완료' : '알림 신청'">
                                    알림 신청
                                </span>
                            </button>
                            <p class="notify-help" data-role="notify-help-text">
                                도서가 대출 가능 상태가 될 경우 알림 이메일이 발송됩니다.
                            </p>
                        </div>
                    </div>
                </aside>
            </section>
        </main>
    </div>
</div>

<div th:replace="~{fragments/modal-alert :: alertModal}"></div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/modal-alert.js}"></script>
<script th:src="@{/js/book-detail.js}"></script>
</body>
</html>
