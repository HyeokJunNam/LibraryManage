<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 상세</title>
    <link rel="stylesheet" th:href="@{/css/book-detail.css}">

    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
</head>
<body th:with="isLoggedIn=${#authentication != null and #authentication.principal != 'anonymousUser'}">

<div class="page" th:data-login-id="${isLoggedIn ? #authentication.principal.loginId : ''}">
    <div class="page__inner">

        <div class="detail-topbar">
            <a id="backToList" th:href="@{/}" class="back-link">← 도서 목록으로</a>

            <div class="detail-topbar__user" th:if="${isLoggedIn}">
                <span class="detail-topbar__username">
                    <span th:text="${#authentication.principal.name}">사용자</span> 님
                </span>

                <form th:action="@{/logout}" method="post" class="detail-topbar__logout-form">
                    <button type="submit" class="detail-topbar__logout-btn">로그아웃</button>
                </form>
            </div>

            <div class="detail-topbar__guest" th:unless="${isLoggedIn}">
                <a th:href="@{/login}" class="detail-topbar__login-btn">로그인</a>
            </div>
        </div>

        <section class="detail-hero">
            <div class="detail-hero__main">
                <p class="detail-hero__eyebrow">BOOK DETAIL</p>

                <div class="detail-hero__title-row">
                    <h1 class="detail-hero__title" th:text="${book.title}">도서명</h1>

                    <span class="availability-badge"
                          th:classappend="${book.canBorrow} ? ' availability-badge--available' : ' availability-badge--unavailable'"
                          th:text="${book.canBorrow} ? '대여 가능' : '대여 불가'">
                        대여 가능
                    </span>
                </div>

                <div class="detail-hero__meta">
                    <div class="detail-meta-card">
                        <span class="detail-meta-card__label">ISBN</span>
                        <strong class="detail-meta-card__value" th:text="${book.isbn}">9780000000000</strong>
                    </div>

                    <div class="detail-meta-card">
                        <span class="detail-meta-card__label">저자</span>
                        <strong class="detail-meta-card__value" th:text="${book.author}">저자명</strong>
                    </div>

                    <div class="detail-meta-card">
                        <span class="detail-meta-card__label">출판사</span>
                        <strong class="detail-meta-card__value" th:text="${book.publisher}">출판사명</strong>
                    </div>
                </div>
            </div>
        </section>

        <section class="summary-section">
            <div class="summary-card">
                <span class="summary-card__label">전체 보유</span>
                <strong class="summary-card__value" th:text="${book.bookItemCount}">0</strong>
            </div>

            <div class="summary-card">
                <span class="summary-card__label">대여 중</span>
                <strong class="summary-card__value" th:text="${book.borrowedCount}">0</strong>
            </div>

            <div class="summary-card">
                <span class="summary-card__label">대여 가능</span>
                <strong class="summary-card__value" th:text="${book.availableCount}">0</strong>
            </div>

            <div class="summary-card">
                <span class="summary-card__label">대여 불가</span>
                <strong class="summary-card__value" th:text="${book.unavailableCount}">0</strong>
            </div>
        </section>

        <section class="item-section">
            <div class="section-head">
                <div>
                    <h2 class="section-head__title">도서 개별 보유 현황</h2>
                    <p class="section-head__desc">각 도서 아이템의 상태와 위치를 확인하고 바로 대여 또는 반납할 수 있습니다.</p>
                </div>
            </div>

            <div th:if="${book.bookItemDetails == null or #lists.isEmpty(book.bookItemDetails)}"
                 class="item-empty">
                <div class="item-empty__icon">📚</div>
                <div class="item-empty__title">등록된 도서 아이템이 없습니다.</div>
                <div class="item-empty__desc">관리자가 보유 도서를 등록하면 이곳에 표시됩니다.</div>
            </div>

            <div th:if="${book.bookItemDetails != null and !#lists.isEmpty(book.bookItemDetails)}"
                 class="item-table">

                <div class="item-table__header">
                    <div>도서 ID</div>
                    <div>상태</div>
                    <div>위치</div>
                    <div>대여 상태</div>
                    <div>대여일</div>
                    <div>반납예정일</div>
                    <div>신청</div>
                </div>

                <div th:each="item : ${book.bookItemDetails}" class="item-row">
                    <div class="item-row__cell item-row__cell--id">
                        <span class="item-row__mobile-label">도서 ID</span>
                        <span th:text="${item.id}">1</span>
                    </div>

                    <div class="item-row__cell">
                        <span class="item-row__mobile-label">상태</span>
                        <span class="status-badge"
                              th:classappend="${
                                  item.status.name() == 'AVAILABLE' ? ' status-badge--available' :
                                  (item.status.name() == 'DAMAGED' ? ' status-badge--damaged' :
                                  (item.status.name() == 'LOST' ? ' status-badge--lost' : ' status-badge--discarded'))
                              }"
                              th:text="${
                                  item.status.name() == 'AVAILABLE' ? '정상' :
                                  (item.status.name() == 'DAMAGED' ? '파손' :
                                  (item.status.name() == 'LOST' ? '분실' : '폐기'))
                              }">
                            정상
                        </span>
                    </div>

                    <div class="item-row__cell">
                        <span class="item-row__mobile-label">위치</span>
                        <span class="item-location" th:text="${item.location}">A-01</span>
                    </div>

                    <div class="item-row__cell item-row__cell--borrow-status">
                        <span class="item-row__mobile-label">대여 상태</span>

                        <span class="availability-badge"
                              th:classappend="${
                                  item.borrowed
                                  ? ' availability-badge--borrowed'
                                  : (item.status.name() != 'AVAILABLE'
                                      ? ' availability-badge--unavailable'
                                      : ' availability-badge--available')
                              }"
                              th:text="${
                                  item.borrowed
                                  ? '대여 중'
                                  : (item.status.name() != 'AVAILABLE' ? '대여 불가' : '대여 가능')
                              }">
                            대여 가능
                        </span>
                    </div>

                    <div class="item-row__cell">
                        <span class="item-row__mobile-label">대여일</span>
                        <span class="date-chip date-chip--borrowed"
                              th:classappend="${item.borrowed and item.borrowedAt != null} ? '' : ' date-chip--empty'"
                              th:text="${
                                item.borrowed and item.borrowedAt != null
                                ? #temporals.format(item.borrowedAt, 'yyyy-MM-dd')
                                : '-'
                            }">
                            -
                        </span>
                    </div>

                    <div class="item-row__cell">
                        <span class="item-row__mobile-label">반납예정일</span>
                        <span class="date-chip date-chip--due"
                              th:classappend="${item.borrowed and item.dueAt != null} ? '' : ' date-chip--empty'"
                              th:text="${
                                item.borrowed and item.dueAt != null
                                ? #temporals.format(item.dueAt, 'yyyy-MM-dd')
                                : '-'
                            }">
                            -
                        </span>
                    </div>

                    <div class="item-row__cell item-row__cell--action">
                        <span class="item-row__mobile-label">신청</span>

                        <button type="button"
                                class="book-action-btn"
                                th:classappend="${
                                    !isLoggedIn
                                    ? ' book-action-btn--disabled'
                                    : (item.borrowed
                                        ? ' book-action-btn--return'
                                        : (item.status.name() == 'AVAILABLE'
                                            ? ' book-action-btn--borrow'
                                            : ' book-action-btn--disabled'))
                                }"
                                th:data-book-item-id="${item.id}"
                                th:data-action="${
                                    !isLoggedIn
                                    ? 'login'
                                    : (item.borrowed
                                        ? 'return'
                                        : (item.status.name() == 'AVAILABLE' ? 'borrow' : 'disabled'))
                                }"
                                th:disabled="${!isLoggedIn or (!item.borrowed && item.status.name() != 'AVAILABLE')}"
                                th:text="${
                                    !isLoggedIn
                                    ? '로그인 필요'
                                    : (item.borrowed
                                        ? '반납'
                                        : (item.status.name() == 'AVAILABLE' ? '대여' : '대여 불가'))
                                }">
                            대여하기
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </div>
</div>

<script th:src="@{/js/book-detail.js}"></script>
</body>
</html>
