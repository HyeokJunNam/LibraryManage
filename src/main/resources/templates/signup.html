<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/signup.css}">

    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
</head>
<body>
<div class="login-page">
    <div class="login-page__bg"></div>

    <div class="login-layout">
        <section class="login-hero">
            <a th:href="@{/}" href="/" class="login-hero__brand-link" aria-label="메인으로 이동">
                <span class="login-hero__brand-text">LIBRARY</span>
            </a>

            <div class="login-hero__content">
                <p class="login-hero__eyebrow">CREATE ACCOUNT</p>
                <h1 class="login-hero__title">회원가입</h1>
                <p class="login-hero__description">
                    계정을 생성하면 도서 검색, 대여 신청, 이용 내역 관리 기능을 사용할 수 있습니다.
                </p>

                <div class="login-hero__features">
                    <div class="feature-card">
                        <div class="feature-card__icon" aria-hidden="true">🔎</div>
                        <div class="feature-card__text">
                            <strong>빠른 검색</strong>
                            <span>도서명, 저자, ISBN으로 원하는 도서를 빠르게 찾을 수 있습니다.</span>
                        </div>
                    </div>

                    <div class="feature-card">
                        <div class="feature-card__icon" aria-hidden="true">📚</div>
                        <div class="feature-card__text">
                            <strong>대여 기능</strong>
                            <span>보유 도서를 확인하고 바로 대여 신청까지 진행할 수 있습니다.</span>
                        </div>
                    </div>

                    <div class="feature-card">
                        <div class="feature-card__icon" aria-hidden="true">👤</div>
                        <div class="feature-card__text">
                            <strong>내 정보 관리</strong>
                            <span>대여 내역과 계정 정보를 한 곳에서 편하게 관리할 수 있습니다.</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="login-panel">
            <div class="login-card">
                <div class="login-card__header">
                    <p class="login-card__eyebrow">JOIN LIBRARY</p>
                    <h2 class="login-card__title">회원가입</h2>
                    <p class="login-card__description">
                        서비스 이용을 위한 기본 정보를 입력해주세요.
                    </p>
                </div>

                <div id="formError" class="alert alert--error is-hidden"></div>

                <form id="signupForm" class="login-form" novalidate>
                    <div id="loginIdGroup" class="form-group">
                        <label for="loginId" class="form-label">아이디</label>
                        <input
                                id="loginId"
                                name="loginId"
                                type="text"
                                class="form-input"
                                placeholder="아이디를 입력하세요"
                                autocomplete="username"
                                required
                        >
                    </div>

                    <div id="passwordGroup" class="form-group">
                        <label for="password" class="form-label">비밀번호</label>
                        <input
                                id="password"
                                name="password"
                                type="password"
                                class="form-input"
                                placeholder="비밀번호를 입력하세요"
                                autocomplete="new-password"
                                required
                        >
                    </div>

                    <div id="nameGroup" class="form-group">
                        <label for="name" class="form-label">이름</label>
                        <input
                                id="name"
                                name="name"
                                type="text"
                                class="form-input"
                                placeholder="이름을 입력하세요"
                                autocomplete="name"
                                required
                        >
                    </div>

                    <div id="emailGroup" class="form-group">
                        <label for="email" class="form-label">이메일</label>
                        <div class="form-inline">
                            <input
                                    id="email"
                                    name="email"
                                    type="email"
                                    class="form-input"
                                    placeholder="이메일을 입력하세요"
                                    autocomplete="email"
                                    required
                            >
                            <button
                                    type="button"
                                    id="sendVerificationButton"
                                    class="login-button login-button--secondary"
                            >
                                <span id="sendVerificationButtonText">코드 발송</span>
                            </button>
                        </div>
                    </div>

                    <div id="verificationCodeGroup" class="form-group is-hidden">
                        <label for="verificationCode" class="form-label">인증코드</label>
                        <div class="form-inline">
                            <input
                                    id="verificationCode"
                                    name="verificationCode"
                                    type="text"
                                    class="form-input"
                                    placeholder="인증코드 6자리"
                                    autocomplete="one-time-code"
                                    inputmode="numeric"
                                    maxlength="6"
                            >
                            <button
                                    type="button"
                                    id="verifyCodeButton"
                                    class="login-button login-button--secondary"
                            >
                                인증 확인
                            </button>
                        </div>
                        <div id="verificationStatus" class="is-hidden" aria-live="polite"></div>
                    </div>

                    <input type="hidden" id="role" name="role" value="ROLE_USER">
                    <input type="hidden" id="emailVerified" name="emailVerified" value="false">

                    <button type="submit" id="signupButton" class="login-button login-button--submit">
                        회원가입 완료
                    </button>
                </form>

                <div class="login-card__footer">
                    <span>이미 계정이 있으신가요?</span>
                    <a th:href="@{/login}" href="/login" class="login-card__signup-link">로그인</a>
                </div>
            </div>
        </section>
    </div>
</div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/signup.js}"></script>
</body>
</html>
