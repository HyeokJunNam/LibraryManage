<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-page">
    <div class="auth-page__inner">

        <!-- 좌측 설명 영역 -->
        <section class="auth-hero">
            <p class="auth-hero__eyebrow">LIBRARY</p>
            <h1 class="auth-hero__title">회원가입</h1>
            <p class="auth-hero__desc">
                계정을 생성하면 도서 검색, 대여 신청, 이용 내역 관리 기능을 사용할 수 있습니다.
            </p>

            <div class="auth-hero__features">
                <div class="feature-card">
                    <strong class="feature-card__title">빠른 검색</strong>
                    <p class="feature-card__desc">도서명, 저자, ISBN으로 간편 조회</p>
                </div>

                <div class="feature-card">
                    <strong class="feature-card__title">대여 기능</strong>
                    <p class="feature-card__desc">보유 도서를 바로 신청</p>
                </div>

                <div class="feature-card">
                    <strong class="feature-card__title">내 정보 관리</strong>
                    <p class="feature-card__desc">대여 내역 및 계정 정보 확인</p>
                </div>
            </div>
        </section>

        <!-- 회원가입 카드 -->
        <section class="auth-card-wrap">
            <div class="auth-card">

                <div class="auth-card__header">
                    <h2 class="auth-card__title">회원가입</h2>
                    <p class="auth-card__desc">
                        서비스 이용을 위한 기본 정보를 입력해주세요.
                    </p>
                </div>

                <form th:action="@{/signup}" method="post" class="auth-form">

                    <!-- 이름 -->
                    <div class="form-group">
                        <label for="name" class="form-label">이름</label>
                        <input id="name"
                               name="name"
                               type="text"
                               class="form-input"
                               placeholder="이름을 입력하세요"
                               required>
                    </div>

                    <!-- 아이디 -->
                    <div class="form-group">
                        <label for="loginId" class="form-label">아이디</label>
                        <input id="loginId"
                               name="loginId"
                               type="text"
                               class="form-input"
                               placeholder="아이디를 입력하세요"
                               required>
                    </div>

                    <!-- 비밀번호 -->
                    <div class="form-group">
                        <label for="password" class="form-label">비밀번호</label>
                        <input id="password"
                               name="password"
                               type="password"
                               class="form-input"
                               placeholder="비밀번호를 입력하세요"
                               required>
                    </div>

                    <!-- 🔥 ROLE hidden -->
                    <input type="hidden" name="role" value="ROLE_ADMIN">

                    <!-- 에러 메시지 -->
                    <div th:if="${errorMessage != null}"
                         class="form-message form-message--error"
                         th:text="${errorMessage}">
                        오류 메시지
                    </div>

                    <!-- 버튼 -->
                    <button type="submit" class="submit-btn">
                        회원가입
                    </button>

                </form>

                <!-- 하단 -->
                <div class="auth-card__footer">
                    <span>이미 계정이 있으신가요?</span>
                    <a th:href="@{/login}" class="text-link">로그인</a>
                </div>

            </div>
        </section>

    </div>
</div>
</body>
</html>
