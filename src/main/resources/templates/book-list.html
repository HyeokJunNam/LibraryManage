<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/topbar.css}">
    <link rel="stylesheet" th:href="@{/css/book-list.css}">
</head>
<body>
<div class="app">
    <div th:replace="~{fragments/topbar :: topbar}"></div>

    <div class="book-list">
        <main class="page">
            <section class="search-panel">
                <div class="search-panel__head">
                    <div>
                        <h1 class="search-panel__title">도서 검색</h1>
                        <p class="search-panel__desc">전체 도서와 검색 결과를 이 화면에서 바로 확인할 수 있습니다.</p>
                    </div>
                </div>

                <form id="searchForm" class="search-form">
                    <div class="search-form__row">
                        <div class="field field--select">
                            <label for="condition" class="field__label">검색 조건</label>
                            <select id="condition" class="field__control">
                                <option value="title">도서명</option>
                                <option value="isbn">ISBN</option>
                                <option value="author">저자</option>
                                <option value="publisher">출판사</option>
                            </select>
                        </div>

                        <div class="field field--input">
                            <label for="keyword" class="field__label">검색어</label>
                            <input
                                    id="keyword"
                                    type="text"
                                    class="field__control"
                                    placeholder="검색어를 입력하세요"
                            >
                        </div>

                        <div class="search-form__actions">
                            <button type="submit" class="btn btn--primary btn--xl">검색</button>
                            <button type="button" id="resetBtn" class="btn btn--ghost btn--xl">초기화</button>
                        </div>
                    </div>
                </form>
            </section>

            <section class="list-panel">
                <div class="list-panel__head">
                    <div>
                        <h2 class="list-panel__title">도서 목록</h2>
                        <p class="list-panel__desc">전체 도서 또는 검색된 도서를 확인할 수 있습니다.</p>
                    </div>

                    <div class="list-panel__count">
                        <span>총</span>
                        <strong th:text="${books != null ? books.totalElements : 0}">0</strong>
                        <span>권</span>
                    </div>
                </div>

                <div th:if="${books == null or books.content == null or #lists.isEmpty(books.content)}"
                     class="book-empty">
                    <div class="book-empty__icon">📚</div>
                    <div class="book-empty__title">조회된 도서가 없습니다.</div>
                    <div class="book-empty__desc">검색 조건을 변경해서 다시 시도해보세요.</div>
                </div>

                <div th:if="${books != null and books.content != null and !#lists.isEmpty(books.content)}"
                     class="book-table">
                    <div class="book-table__head">
                        <div>도서명</div>
                        <div>ISBN</div>
                        <div>저자</div>
                        <div>출판사</div>
                    </div>

                    <div th:each="book : ${books.content}" class="book-table__row">
                        <div class="book-table__title">
                            <a th:href="@{/library/books/{bookId}(bookId=${book.id})}"
                               th:text="${book.title}">
                                도서명
                            </a>
                        </div>

                        <div class="book-table__cell" th:text="${book.isbn}">9780000000000</div>
                        <div class="book-table__cell" th:text="${book.author}">저자</div>
                        <div class="book-table__cell" th:text="${book.publisher}">출판사</div>
                    </div>
                </div>

                <nav th:if="${books != null and books.totalPages > 0}" class="pagination">
                    <a th:if="${!books.first}"
                       th:href="@{/library/books(page=${books.number - 1}, title=${param.title}, isbn=${param.isbn}, author=${param.author}, publisher=${param.publisher})}"
                       class="pagination__button">
                        이전
                    </a>

                    <span th:if="${books.first}" class="pagination__button pagination__button--disabled">이전</span>

                    <a th:each="pageNumber : ${#numbers.sequence(0, books.totalPages - 1)}"
                       th:href="@{/library/books(page=${pageNumber}, title=${param.title}, isbn=${param.isbn}, author=${param.author}, publisher=${param.publisher})}"
                       class="pagination__number"
                       th:classappend="${pageNumber == books.number} ? ' pagination__number--active' : ''"
                       th:text="${pageNumber + 1}">
                        1
                    </a>

                    <a th:if="${!books.last}"
                       th:href="@{/library/books(page=${books.number + 1}, title=${param.title}, isbn=${param.isbn}, author=${param.author}, publisher=${param.publisher})}"
                       class="pagination__button">
                        다음
                    </a>

                    <span th:if="${books.last}" class="pagination__button pagination__button--disabled">다음</span>
                </nav>
            </section>
        </main>
    </div>
</div>

<script th:src="@{/js/book-list.js}"></script>
</body>
</html>
