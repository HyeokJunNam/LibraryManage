<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 목록</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Malgun Gothic", Arial, sans-serif;
            background: #f5f7fb;
            color: #222;
        }

        .header {
            background: #ffffff;
            border-bottom: 1px solid #e5e9f0;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            margin: 0;
            font-size: 24px;
        }

        .header-left p {
            margin: 6px 0 0;
            color: #666;
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .login-user {
            font-size: 14px;
            color: #444;
        }

        .logout-form {
            margin: 0;
        }

        .logout-button {
            border: none;
            background: #ef4444;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .logout-button:hover {
            background: #dc2626;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .top-bar h2 {
            margin: 0;
            font-size: 22px;
        }

        .create-button {
            display: inline-block;
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 11px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
        }

        .create-button:hover {
            background: #1d4ed8;
        }

        .card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8fafc;
        }

        th, td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid #eef2f7;
            font-size: 14px;
        }

        th {
            color: #475569;
            font-weight: 700;
        }

        tbody tr:hover {
            background: #fafcff;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-available {
            background: #e8f7ed;
            color: #15803d;
        }

        .status-borrowed {
            background: #fff1f2;
            color: #be123c;
        }

        .detail-link {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .detail-link:hover {
            text-decoration: underline;
        }

        .empty-box {
            padding: 48px 24px;
            text-align: center;
            color: #666;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body>
<header class="header">
    <div class="header-left">
        <h1>도서 관리 시스템</h1>
        <p>세션 기반 로그인 상태로 접속 중입니다.</p>
    </div>

    <div class="header-right">
        <div class="login-user">
            로그인 사용자:
            <strong th:text="${loginId}">user</strong>
        </div>

        <form class="logout-form" th:action="@{/logout}" method="post">

            <button type="submit" class="logout-button">로그아웃</button>
        </form>
    </div>
</header>

<main class="container">
    <div class="top-bar">
        <h2>도서 목록</h2>
        <a th:href="@{/books/create}" class="create-button">도서 등록</a>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="empty-box">
        등록된 도서가 없습니다.
    </div>

    <div th:unless="${#lists.isEmpty(books)}" class="card">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>저자</th>
                    <th>출판사</th>
                    <th>대여 상태</th>
                    <th>상세</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.id}">1</td>
                    <td th:text="${book.title}">도서명</td>
                    <td th:text="${book.author}">저자명</td>
                    <td th:text="${book.publisher}">출판사</td>
                    <td>
                        <span th:if="${book.available}" class="status status-available">대여 가능</span>
                        <span th:unless="${book.available}" class="status status-borrowed">대여 중</span>
                    </td>
                    <td>
                        <a th:href="@{/books/{id}(id=${book.id})}" class="detail-link">보기</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
